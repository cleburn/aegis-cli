<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Background gradient - deep slate to near-black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    
    <!-- Shield gradient - cool steel blue -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="40%" style="stop-color:#388bfd"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    
    <!-- Inner shield glow -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#79c0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>

    <!-- Glow filter for shield -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft shadow for text -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#58a6ff" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>
  
  <!-- Grid overlay -->
  <rect width="900" height="320" rx="12" fill="url(#grid)" opacity="0.4"/>

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="900" height="2" rx="1" fill="url(#shieldGrad)" opacity="0.6"/>

  <!-- Shield icon -->
  <g transform="translate(80, 72)" filter="url(#glow)">
    <!-- Shield outer shape -->
    <path d="M 56 8 L 12 28 L 12 76 C 12 112 30 146 56 162 C 82 146 100 112 100 76 L 100 28 Z" 
          fill="none" stroke="url(#shieldGrad)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Shield inner fill (very subtle) -->
    <path d="M 56 16 L 20 33 L 20 76 C 20 108 36 138 56 152 C 76 138 92 108 92 76 L 92 33 Z" 
          fill="url(#innerGlow)"/>
    
    <!-- Checkmark / governance symbol inside shield -->
    <g transform="translate(56, 78)" stroke="url(#shieldGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Three horizontal lines suggesting structure/policy -->
      <line x1="-18" y1="-20" x2="18" y2="-20" opacity="0.6"/>
      <line x1="-18" y1="-8" x2="18" y2="-8" opacity="0.8"/>
      <line x1="-18" y1="4" x2="10" y2="4"/>
      <!-- Checkmark at bottom right -->
      <polyline points="2,16 10,24 24,8" stroke-width="3"/>
    </g>
  </g>

  <!-- AEGIS wordmark -->
  <text x="228" y="148" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="72" font-weight="700" letter-spacing="12" fill="#e6edf3" filter="url(#textShadow)">
    AEGIS
  </text>

  <!-- Tagline -->
  <text x="232" y="186" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="15" fill="#8b949e" letter-spacing="3">
    STRUCTURED GOVERNANCE FOR AI AGENTS
  </text>

  <!-- Subtle descriptor line -->
  <line x1="232" y1="204" x2="620" y2="204" stroke="#21262d" stroke-width="1"/>
  
  <text x="232" y="228" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="12.5" fill="#6e7681" letter-spacing="1">
    Scoped roles · Enforced permissions · Autonomy levels · Coordination protocols
  </text>

  <!-- Version / format badge area -->
  <g transform="translate(232, 248)">
    <rect width="90" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="45" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      .agentpolicy/
    </text>
  </g>
  
  <g transform="translate(336, 248)">
    <rect width="108" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="54" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      schema-validated
    </text>
  </g>

  <g transform="translate(458, 248)">
    <rect width="100" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="50" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      agent-agnostic
    </text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="318" width="900" height="2" rx="1" fill="url(#shieldGrad)" opacity="0.3"/>
</svg>
