<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    
    <linearGradient id="shieldOutline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#388bfd"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    
    <linearGradient id="innerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2433;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0.9"/>
    </linearGradient>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="900" height="320" rx="12" fill="url(#bg)"/>
  <rect width="900" height="320" rx="12" fill="url(#grid)" opacity="0.3"/>
  <rect x="0" y="0" width="900" height="2" rx="1" fill="url(#shieldOutline)" opacity="0.5"/>

  <!-- Shield icon — bold style matching canonical favicon -->
  <g transform="translate(80, 68)" filter="url(#glow)">
    <!-- Shield outer shape — bold stroke -->
    <path d="M 56 8 L 12 28 L 12 76 C 12 112 30 146 56 162 C 82 146 100 112 100 76 L 100 28 Z" 
          fill="url(#innerFill)" stroke="url(#shieldOutline)" stroke-width="4.5" stroke-linejoin="round"/>
    
    <!-- Document lines inside shield -->
    <g stroke="url(#shieldOutline)" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="38" y1="58" x2="74" y2="58" opacity="0.7"/>
      <line x1="38" y1="72" x2="74" y2="72" opacity="0.8"/>
      <line x1="38" y1="86" x2="64" y2="86" opacity="0.9"/>
    </g>
    
    <!-- Green checkmark -->
    <polyline points="50,104 58,112 74,94" stroke="#4ade80" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AEGIS wordmark -->
  <text x="228" y="148" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="72" font-weight="700" letter-spacing="12" fill="#e6edf3">
    AEGIS
  </text>

  <!-- Tagline -->
  <text x="232" y="186" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="15" fill="#8b949e" letter-spacing="3">
    END-TO-END GOVERNANCE FOR AI AGENTS
  </text>

  <line x1="232" y1="204" x2="640" y2="204" stroke="#21262d" stroke-width="1"/>
  
  <text x="232" y="228" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" 
        font-size="12.5" fill="#6e7681" letter-spacing="1">
    Policy at the root · Enforcement at runtime · Accountability on every action
  </text>

  <!-- Badges -->
  <g transform="translate(232, 248)">
    <rect width="90" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="45" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      .agentpolicy/
    </text>
  </g>
  
  <g transform="translate(336, 248)">
    <rect width="88" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="44" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      zero overhead
    </text>
  </g>

  <g transform="translate(438, 248)">
    <rect width="100" height="24" rx="4" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="50" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
      agent-agnostic
    </text>
  </g>

  <g transform="translate(552, 248)">
    <rect width="86" height="24" rx="4" fill="#238636" opacity="0.15" stroke="#238636" stroke-width="1" stroke-opacity="0.3"/>
    <text x="43" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#4ade80">
      open source
    </text>
  </g>

  <rect x="0" y="318" width="900" height="2" rx="1" fill="url(#shieldOutline)" opacity="0.25"/>
</svg>
